<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <filter id="ghibliTexture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#fff5e6" surfaceScale="2">
        <feDistantLight azimuth="45" elevation="60" />
      </feDiffuseLighting>
    </filter>

    <linearGradient id="watercolorBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#2a5298;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#3a7bd5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#162a4d;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="softShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4a4a4a;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#4a4a4a;stop-opacity:0" />
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="#fdfaf0" filter="url(#ghibliTexture)" opacity="0.3"/>

  <ellipse cx="210" cy="465" rx="100" ry="30" fill="url(#softShadow)" />

  <g transform="translate(10, 10)">
    <path d="M120 220 Q120 190 160 190 H240 Q280 190 280 220 V430 Q280 470 200 470 Q120 470 120 430 Z" 
          fill="url(#watercolorBlue)" stroke="#223344" stroke-width="2.5" stroke-linejoin="round"/>
    
    <path d="M135 420 Q150 450 200 450 Q250 450 265 420" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />

    <path d="M120 270 H280 V420 H120 Z" fill="#f4ead5" stroke="#223344" stroke-width="2" />
    <rect x="120" y="280" width="160" height="18" fill="#8cb4d9" opacity="0.7" />
    <rect x="120" y="400" width="160" height="18" fill="#8cb4d9" opacity="0.7" />

    <rect x="180" y="175" width="40" height="15" fill="#3a6ab0" stroke="#223344" stroke-width="2" />
    
    <rect x="150" y="130" width="100" height="45" rx="6" fill="#fcfcfc" stroke="#223344" stroke-width="2.5" />
    <g stroke="#b0b0b0" stroke-width="1.2">
      <line x1="160" y1="135" x2="160" y2="170" />
      <line x1="173" y1="135" x2="173" y2="170" />
      <line x1="186" y1="135" x2="186" y2="170" />
      <line x1="200" y1="135" x2="200" y2="170" />
      <line x1="213" y1="135" x2="213" y2="170" />
      <line x1="226" y1="135" x2="226" y2="170" />
      <line x1="240" y1="135" x2="240" y2="170" />
    </g>

    <path d="M175 130 V100 Q175 75 200 75 Q225 75 225 100 V130 Z" 
          fill="#fcfcfc" stroke="#223344" stroke-width="2.5" />

    <path d="M140 210 Q140 200 155 200" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    <ellipse cx="190" cy="95" rx="8" ry="12" fill="#ffffff" opacity="0.3" transform="rotate(-20, 190, 95)" />
  </g>
</svg>
