<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metalBodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5E7EB" />
      <stop offset="25%" stop-color="#D1D5DB" />
      <stop offset="50%" stop-color="#F3F4F6" />
      <stop offset="75%" stop-color="#9CA3AF" />
      <stop offset="100%" stop-color="#D1D5DB" />
    </linearGradient>

    <linearGradient id="darkPartsGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151" />
      <stop offset="50%" stop-color="#1F2937" />
      <stop offset="100%" stop-color="#374151" />
    </linearGradient>

    <linearGradient id="deepBlueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="50%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1E40AF" />
    </linearGradient>

    <linearGradient id="texturedSilverRing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F3F4F6" />
      <stop offset="50%" stop-color="#D1D5DB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>

    <linearGradient id="cartridgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DBEAFE" />
      <stop offset="50%" stop-color="#A7C9F3" />
      <stop offset="100%" stop-color="#93C5FD" />
    </linearGradient>

    <pattern id="metalTexture" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 5,5 L 45,45 M 10,5 L 50,45 M 5,10 L 45,50" stroke="#9CA3AF" stroke-width="0.5" stroke-opacity="0.3"/>
      <path d="M 45,5 L 5,45 M 40,5 L 0,45 M 50,10 L 10,50" stroke="#E5E7EB" stroke-width="0.5" stroke-opacity="0.2"/>
    </pattern>

    <filter id="ghibliSoftness">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" />
      <feColorMatrix type="matrix" values="1 0 0 0 0.02 0 1 0 0 0.02 0 0 1 0 0.01 0 0 0 1 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <mask id="penMask">
      <g transform="translate(10, 0) rotate(-35, 400, 400)">
        <path d="M350 300 C 350 280, 650 280, 650 300 L 650 400 C 650 420, 350 420, 350 400 Z" fill="white" />
        <path d="M650 300 C 680 300, 700 320, 700 350 C 700 380, 680 400, 650 400" fill="white" />
        <path d="M320 300 C 320 285, 350 285, 350 300 L 350 400 C 350 415, 320 415, 320 400 Z" fill="white" />
        <path d="M220 315 L 320 300 L 320 400 L 220 385 Z" fill="white" />
        <rect x="180" y="320" width="40" height="60" rx="4" fill="white" />
        <path d="M80 330 L 180 325 L 180 375 L 80 370 Z" fill="white" />
      </g>
    </mask>
  </defs>

  <g transform="translate(10, 0) rotate(-35, 400, 400)">
    
    <path d="M350 300 C 350 280, 650 280, 650 300 L 650 400 C 650 420, 350 420, 350 400 Z" fill="#D1D5DB" stroke="#374151" stroke-width="4"/>
    <path d="M650 300 C 680 300, 700 320, 700 350 C 700 380, 680 400, 650 400" fill="#1F2937" stroke="#374151" stroke-width="4" />
    
    <path d="M350 300 C 350 280, 650 280, 650 300 L 650 400 C 650 420, 350 420, 350 400 Z" fill="url(#metalBodyGradient)" filter="url(#ghibliSoftness)" opacity="0.9" />
    <path d="M650 300 C 680 300, 700 320, 700 350 C 700 380, 680 400, 650 400" fill="url(#darkPartsGradient)" filter="url(#ghibliSoftness)" opacity="0.9" />

    <path d="M360 315 Q 500 305 640 315" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <path d="M660 310 C 675 310, 685 325, 685 350 C 685 375, 675 390, 660 390" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.4" fill="none"/>

    <rect x="520" y="325" width="80" height="50" rx="25" fill="#1F2937" fill-opacity="0.9" filter="url(#ghibliSoftness)" />
    <circle cx="545" cy="350" r="14" fill="url(#deepBlueGradient)" stroke="#111827" stroke-width="2.5" filter="url(#ghibliSoftness)" />
    <circle cx="575" cy="350" r="14" fill="url(#deepBlueGradient)" stroke="#111827" stroke-width="2.5" filter="url(#ghibliSoftness)" />
    <path d="M320 300 C 320 285, 350 285, 350 300 L 350 400 C 350 415, 320 415, 320 400 Z" fill="url(#deepBlueGradient)" stroke="#1E3A8A" stroke-width="3" filter="url(#ghibliSoftness)"/>

    <path d="M220 315 L 320 300 L 320 400 L 220 385 Z" fill="url(#darkPartsGradient)" stroke="#111827" stroke-width="4" filter="url(#ghibliSoftness)"/>

    <rect x="180" y="320" width="40" height="60" rx="4" fill="url(#texturedSilverRing)" stroke="#1F2937" stroke-width="3" filter="url(#ghibliSoftness)"/>
    <line x1="190" y1="320" x2="190" y2="380" stroke="#6B7280" stroke-width="2.5" />
    <line x1="200" y1="320" x2="200" y2="380" stroke="#6B7280" stroke-width="2.5" />
    <line x1="210" y1="320" x2="210" y2="380" stroke="#6B7280" stroke-width="2.5" />

    <path d="M80 330 L 180 325 L 180 375 L 80 370 Z" fill="url(#cartridgeGradient)" fill-opacity="0.8" stroke="#2563EB" stroke-width="3" filter="url(#ghibliSoftness)"/>
    
    <g opacity="0.6">
      <path d="M100 340 L 160 340" stroke="#111827" stroke-width="1" />
      <path d="M100 342 L 160 342" stroke="#1E3A8A" stroke-width="1.5" stroke-dasharray="2,2"/>
      <path d="M100 345 L 160 345" stroke="#1E3A8A" stroke-width="2.5" />
      <path d="M100 348 L 160 348" stroke="#1E3A8A" stroke-width="2.5" />
      <path d="M100 351 L 160 351" stroke="#1E3A8A" stroke-width="1.5" stroke-dasharray="2,2"/>
      <path d="M100 353 L 160 353" stroke="#111827" stroke-width="1" />
    </g>

    <path d="M110 338 Q 140 342 165 338" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <path d="M110 362 Q 140 358 165 362" stroke="#60A5FA" stroke-width="3" stroke-linecap="round" opacity="0.4" fill="none"/>

    <rect width="700" height="150" x="180" y="270" fill="url(#metalTexture)" mask="url(#penMask)" opacity="0.4" />
  </g>
</svg>